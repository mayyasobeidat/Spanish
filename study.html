<body>

<div id="studyContainer">
    <h2>📚 كلمات للمراجعة المكثفة</h2>
    <div id="wordsList"></div>
</div>

<script>
    function displayNeedsStudy() {
        const studyList = JSON.parse(localStorage.getItem('needs_study')) || [];
        const container = document.getElementById('wordsList');
        
        if (studyList.length === 0) {
            container.innerHTML = "<p>ممتاز! لا يوجد كلمات صعبة حالياً. ✅</p>";
            return;
        }

        container.innerHTML = studyList.map(w => `
            <div class="word-card">
                <span><b>${w.sp}</b>: ${w.ar}</span>
                <button onclick="removeFromStudy('${w.sp}')">تم الحفظ ✅</button>
            </div>
        `).join('');
    }
    
    function removeFromStudy(spWord) {
        let studyList = JSON.parse(localStorage.getItem('needs_study'));
        studyList = studyList.filter(w => w.sp !== spWord);
        localStorage.setItem('needs_study', JSON.stringify(studyList));
        displayNeedsStudy(); // إعادة التحديث
    }

    window.onload = displayNeedsStudy;
</script>
</body>
</html>
