<!DOCTYPE html>
<html dir="rtl">
<head>
  <link rel="manifest" href="manifest.json">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta charset="UTF-8">
  <title>Spanish Words App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="application-name" content="Yaas Spanish">
<meta name="apple-mobile-web-app-title" content="Yaas Spanish">
<meta name="theme-color" content="#1a1a2e"> <meta name="msapplication-navbutton-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="display" content="standalone">

<meta name="theme-color" content="#1a1a2e"> 

<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3898/3898082.png">
<link rel="icon" sizes="192x192" href="https://cdn-icons-png.flaticon.com/512/3898/3898082.png">
<link rel="icon" type="image/png" href="https://img.icons8.com/fluency/512/spanish-language.png">
<link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/spanish-language.png">
  <base target="_top">
  <style>

    :root {
      --primary: #4A90E2; --secondary: #50E3C2; --bg: #F5F7FA;
      --text: #2C3E50; --white: #FFFFFF; --card-bg: #FFFFFF; --border: #E1E8EE;
    }
    body.dark {
      --bg: #1a1a2e; --text: #e0e0e0; --card-bg: #16213e; --border: #1a1a2e;
    }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg);
      color: var(--text); margin: 0; display: flex; justify-content: center;
      align-items: center; min-height: 100vh; transition: 0.3s;
    }
    .container {
      background: var(--card-bg); width: 90%; max-width: 450px;
      padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }
    h2 { color: var(--primary); margin-bottom: 25px; }
    input {
      width: 100%; padding: 12px; border: 2px solid var(--border);
      border-radius: 12px; font-size: 16px; background: var(--card-bg);
      color: var(--text); box-sizing: border-box; outline: none; margin-bottom: 10px;
    }
    .btn-hint {
      background: none; border: none; color: var(--primary);
      font-size: 14px; cursor: pointer; text-decoration: underline; margin-bottom: 15px;
    }
    .btn-save {
      width: 100%; background: linear-gradient(135deg, var(--primary), #357ABD);
      color: white; border: none; padding: 14px; border-radius: 12px;
      font-size: 18px; font-weight: bold; cursor: pointer;
    }
 
    .nav-links { margin-top: 20px; }
    .nav-links a { text-decoration: none; color: var(--primary); font-weight: bold; font-size: 14px; }
    
    /* Toast Style */
    #toast {
      visibility: hidden; min-width: 250px; background-color: #2ecc71;
      color: #fff; text-align: center; border-radius: 12px; padding: 16px;
      position: fixed; z-index: 10002; bottom: 30px; left: 50%; transform: translateX(-50%);
    }
    #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
    @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

    /* Login & Logout Overlays - CRITICAL FIX */
    #loginOverlay, .quiz-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(44, 62, 80, 0.95); z-index: 10000; 
      display: none; justify-content: center; align-items: center; 
      backdrop-filter: blur(5px); 
    }

    .login-card, .quiz-card { 
      background: white; padding: 40px 30px; border-radius: 20px; 
      text-align: center; width: 90%; max-width: 380px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .login-input { 
      width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #eee; 
      border-radius: 12px; font-size: 18px; text-align: center; box-sizing: border-box; 
    }

    .btn-login {
      background: #3498db; color: white; border: none; padding: 15px; 
      border-radius: 12px; width: 100%; font-size: 18px; cursor: pointer; font-weight: bold;
    }

    #hintBox { background: rgba(74, 144, 226, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; }

    /* شريط المستخدم العلوي - ترتيب جديد */
#userStatus {
    display: none; 
    position: fixed; 
    top: 0; left: 0;
    width: 100%; 
    justify-content: space-between; 
    align-items: center; 
    padding: 8px 15px; 
    background: var(--card-bg); 
    border-bottom: 1px solid var(--border); 
    z-index: 1001; 
    box-sizing: border-box;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

/* زر الدارك مود - سنلغي الـ Fixed القديم ونضعه في الهيدر */
.theme-switch {
    background: #34495e;
    color: white; 
    border: none; 
    width: 35px; height: 35px;
    border-radius: 50%;
    cursor: pointer; 
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: 0.3s;
}

/* حاوية الأزرار في اليسار */
.header-left {
    display: flex;
    align-items: center;
    gap: 12px; /* مسافة بين الدارك مود والخروج */
}

.btn-logout-small {
    background: #e74c3c; 
    color: white; 
    border: none; 
    padding: 6px 12px; 
    border-radius: 8px; 
    cursor: pointer; 
    font-weight: bold;
    font-size: 13px;
}

/* تعديلات الموبايل (للشاشات الأصغر من 600 بكسل) */
@media (max-width: 600px) {

    .login-card, .quiz-card { 
      width: 75%;
    }
    .container { 
        padding: 15px; 
        margin: 10px; 
        border-radius: 10px; 
    }

    /* تحويل الإحصائيات لصفوف أصغر */
    .stats-bar { 
        gap: 8px; 
    }
    .stat-card { padding: 10px; }
    .stat-card h3 { font-size: 18px; }
    .stat-card p { font-size: 12px; }

    /* تحسين الجدول للموبايل: إخفاء الأعمدة غير الضرورية إذا لزم الأمر */
    td, th { padding: 10px 5px; font-size: 14px; }
    .sp-word { font-size: 15px; }

    /* تكبير الأزرار لتناسب اللمس بالإصبع */
    .btn-quiz, .btn-page, .btn-check {
        padding: 15px;
        font-size: 16px;
    }

    /* تعديل واجهة الكويز لتملأ الشاشة */
    .quiz-card {
        width: 95%;
        padding: 20px;
        max-width: none;
    }
    #quizArWord { font-size: 28px; }
    
    /* منع تكبير الشاشة التلقائي عند الكتابة في الآيفون */
    input[type="text"] { font-size: 16px !important; }
}

    .btn-study {
    width: 100%;
    background: linear-gradient(135deg, #f39c12, #d35400); /* لون برتقالي دراسي */
    color: white;
    border: none;
    padding: 12px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
    box-shadow: 0 4px 10px rgba(243, 156, 18, 0.3);
}

.btn-study:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(243, 156, 18, 0.4);
}

body.dark .btn-study {
    background: linear-gradient(135deg, #e67e22, #a04000);
}
  </style>
</head>
<body>

<div id="userStatus">
  <div style="display: flex; align-items: center; gap: 8px;">
    <span>👤</span>
    <b id="currentDisplayName" style="font-size: 14px; letter-spacing: 1px;"></b>
    <span id="dailyStreak" style="margin-right: 10px; font-size: 14px;">🔥 0</span>
  </div>

  <div class="header-left">
    <button class="theme-switch" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button onclick="logout()" class="btn-logout-small">خروج</button>
  </div>
</div>

<div id="loginOverlay">
  <div class="login-card">
    <div style="font-size: 50px; margin-bottom: 10px;">📚</div>
    <h3>مرحباً بك في قاموسك</h3>
    <p style="color: #7f8c8d;">أدخل اسمك للبدء:</p>
    <input type="text" id="userNameInput" class="login-input" placeholder="مثال: Mayyas">
    <button onclick="login()" class="btn-login">دخول 🚀</button>
  </div>
</div>


<div class="container">
  <h2>📓 دفتري الإسباني</h2>
  
  <div>
    <input type="text" id="spWord" placeholder="الكلمة بالإسبانية">
    <button onclick="getHint()" class="btn-hint">💡 اقتراح ترجمة</button>
  </div>

  <div id="hintBox"></div>

  <input type="text" id="arMeaning" placeholder="المعنى بالعربي">

  <button onclick="saveToMySheet()" id="saveBtn" class="btn-save">حفظ الكلمة ✨</button>

 <div class="nav-links" id="navLinks">
    <a href="test.html">📝 اختبار</a>
    | 
    <a href="list.html">📚 قاموسي</a>
  </div>

  <div style="margin-top: 15px;">
    <button onclick="window.location.href='study.html'" id="studyBtn" class="btn-study" style="display: none;">
      📚 مراجعة الكلمات الصعبة (0)
    </button>
  </div>
</div>

<div id="logoutModal" class="quiz-overlay">
  <div class="quiz-card" style="max-width: 320px;">
    <div style="font-size: 40px; margin-bottom: 15px;">👋</div>
    <h3>تسجيل الخروج</h3>
    <p style="color: #7f8c8d; margin-bottom: 25px;">هل أنت متأكد أنك تريد المغادرة؟</p>
    <div style="display: flex; gap: 10px;">
      <button onclick="confirmLogout()" class="btn-login" style="background: #e74c3c; flex: 1;">خروج</button>
      <button onclick="closeLogoutModal()" class="btn-login" style="background: #bdc3c7; flex: 1;">إلغاء</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // 1. الرابط الجديد الخاص بك (تأكد من نسخه بالكامل)
  const API_URL = "https://script.google.com/macros/s/AKfycbxum9zEdjo1_JESVPDirhcDlIU7YItUbzqHKaImDeYTXpXjUfEKKG6GJM9mFUuSio-Z/exec";

  let currentUser = localStorage.getItem('app_user_id');

 window.onload = function() {
    const currentUser = localStorage.getItem('app_user_id');
    
    // 1. معالجة الثيم (Dark/Light)
    if (localStorage.getItem('theme_list') === 'dark') {
        document.body.classList.add('dark');
        const themeBtn = document.getElementById('themeBtn');
        if (themeBtn) themeBtn.innerText = "☀️";
    }

    // 2. التحقق من المستخدم
    if (!currentUser) {
        const loginOverlay = document.getElementById('loginOverlay');
        if (loginOverlay) loginOverlay.style.display = 'flex';
    } else {
        // تحديث الواجهة فوراً بناءً على الكاش القديم (عشان السرعة)
        updateUIForUser();
        // ثم عمل المزامنة في الخلفية لتحديث البيانات من الشيت
        syncStudyListSilent(currentUser);
    }
};
async function syncStudyListSilent(user) {
    try {
        const response = await fetch(`${API_URL}?action=getStudyWords&user=${user}`);
        const cloudWords = await response.json();
        
        if (Array.isArray(cloudWords)) {
            // تحديث الذاكرة المحلية بما هو موجود في الشيت فعلياً
            localStorage.setItem('needs_study', JSON.stringify(cloudWords));
            
            // إعادة تحديث الواجهة والزر بناءً على البيانات الجديدة
            updateUIForUser();
            console.log("Background Sync Done: Cloud words updated.");
        }
    } catch (e) {
        console.log("Silent sync failed, using local data.");
    }
}
function updateUIForUser() {
    const user = localStorage.getItem('app_user_id');
    if (user) {
        const userStatus = document.getElementById('userStatus');
        if (userStatus) userStatus.style.display = 'flex';
        
        const nameDisplay = document.getElementById('currentDisplayName');
        if (nameDisplay) nameDisplay.innerText = user.toUpperCase();
        
        // تحديث الستريك
        const streak = localStorage.getItem('user_streak') || 0;
        const streakEl = document.getElementById('dailyStreak');
        if (streakEl) streakEl.innerText = `🔥 ${streak}`;
        
        // تحديث الزر بناءً على البيانات (المحلية أو المحدثة من السحاب)
        const studyList = JSON.parse(localStorage.getItem('needs_study')) || [];
        const studyBtn = document.getElementById('studyBtn');
        
        if (studyBtn) {
            if (studyList.length > 0) {
                studyBtn.style.display = 'block';
                // تحديث نص الزر ليشمل العدد الفعلي
                studyBtn.innerText = `📚 مراجعة ${studyList.length} كلمات صعبة`;
            } else {
                studyBtn.style.display = 'none';
            }
        }
    }
}
  function login() {
    const name = document.getElementById('userNameInput').value.trim().toLowerCase();
    if (name.length < 3) { showToast("⚠️ الاسم قصير جداً!"); return; }
    localStorage.setItem('app_user_id', name);
    currentUser = name;
    document.getElementById('loginOverlay').style.display = 'none';
    updateUIForUser();
    showToast(`أهلاً بك ${name.toUpperCase()} 👋`);
  }



  // --- نظام الخروج المطور ---
 function logout() { document.getElementById('logoutModal').style.display = 'flex'; }
  function closeLogoutModal() { document.getElementById('logoutModal').style.display = 'none'; }

  function confirmLogout() {
    localStorage.removeItem('app_user_id');
    currentUser = null;
    document.getElementById('userStatus').style.display = 'none';
    document.getElementById('loginOverlay').style.display = 'flex';
    closeLogoutModal();
    showToast("تم تسجيل الخروج 👋");
  }

 // --- دالة الحفظ المعدلة بـ Fetch ---
  async function saveToMySheet() {
    const sp = document.getElementById('spWord').value.trim();
    const ar = document.getElementById('arMeaning').value.trim();
    if(!sp || !ar) { showToast("⚠️ املأ الحقول"); return; }
    
    // --- السرعة هنا ---
    // 1. نظف الحقول فوراً وكأن العملية تمت
    document.getElementById('spWord').value = "";
    document.getElementById('arMeaning').value = "";
    showToast("جاري الحفظ في الخلفية... ✅");

    // 2. أرسل الطلب لجوجل "وانساه"
    const url = `${API_URL}?action=save&user=${currentUser}&sp=${encodeURIComponent(sp)}&ar=${encodeURIComponent(ar)}`;
    fetch(url).catch(e => console.error("Save failed in background"));
}


   // --- دالة الاقتراحات المعدلة بـ Fetch ---
  async function getHint() {
    const word = document.getElementById('spWord').value.trim();
    if(!word) return;
    
    const hb = document.getElementById('hintBox');
    if(hb) {
      hb.style.display = "block"; 
      hb.innerHTML = 'جاري البحث عن ترجمة... 🔍';
    }
    
    try {
      const url = `${API_URL}?action=getHint&word=${encodeURIComponent(word)}`;
      const response = await fetch(url);
      const res = await response.json();
      
      if(hb) hb.innerHTML = `<b>اقتراح:</b> ${res.ar}`;
      // تعبئة حقل المعنى تلقائياً إذا كان فارغاً
      const arInput = document.getElementById('arMeaning');
      if(arInput && !arInput.value) arInput.value = res.ar;
      
    } catch (error) {
      if(hb) hb.innerHTML = '⚠️ تعذر جلب الاقتراح';
    }
  }

  function toggleTheme() {
    const isDark = document.body.classList.toggle('dark');
    document.getElementById('themeBtn').innerText = isDark ? "☀️" : "🌙";
    localStorage.setItem('theme_list', isDark ? 'dark' : 'light');
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    if(!t) return;
    t.innerText = msg;
    t.style.backgroundColor = (msg.includes("⚠️") || msg.includes("خطأ")) ? "#f39c12" : "#2ecc71";
    t.className = "show";
    setTimeout(() => { t.className = ""; }, 3000);
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    console.log('التطبيق جاهز للتثبيت ✅');
  });
</script>
</body>
</html>
